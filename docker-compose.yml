services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./schemas:/app/schemas
      - ./generated:/app/generated
      - ./examples:/app/examples
      - ./profiles:/app/profiles
      - ./.vpe-workspace:/app/.vpe-workspace
    environment:
      - PYTHONUNBUFFERED=1
      - REQUIREMENT_REUSE_SERVICE_URL=http://requirement-reuse-service:8010
      - VPE_PROFILE_WORKSPACE=/app/.vpe-workspace/profiles
    depends_on:
      - requirement-reuse-service
    command: sh -c "[ -f /app/generated/jsonschema/construct_dcat.schema.json ] && [ -f /app/generated/jsonschema/profile.schema.json ] || /app/scripts/generate.sh; uvicorn app.main:app --host 0.0.0.0 --port 8000"

  requirement-reuse-service:
    build:
      context: .
      dockerfile: requirement-reuse-service/Dockerfile
    ports:
      - "8010:8010"
    volumes:
      - ./requirement-sets:/service/requirement-sets
    environment:
      - PYTHONUNBUFFERED=1
      # LLM strategy configuration (plug-and-play providers; see docs/requirement-extraction.md)
      - RRS_LLM_PROVIDER=${RRS_LLM_PROVIDER:-}
      - RRS_LLM_MODEL=${RRS_LLM_MODEL:-}
      - RRS_LLM_BASE_URL=${RRS_LLM_BASE_URL:-}
      - RRS_LLM_API_KEY=${RRS_LLM_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RRS_REQUIREMENT_STORE=/service/requirement-sets

  generator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./schemas:/app/schemas
      - ./generated:/app/generated
      - ./profiles:/app/profiles
    command: /app/scripts/generate.sh
