name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: construct-dcat-docker
      - uses: actions/checkout@v4
        with:
          repository: jundahuang9123/General-Ontology-Editor
          path: General-Ontology-Editor
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ../General-Ontology-Editor -r backend/requirements.txt pytest
        working-directory: construct-dcat-docker
      - run: pytest
        working-directory: construct-dcat-docker
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build
        working-directory: construct-dcat-docker
