id: https://w3id.org/construct-dcat/profile
name: construct_dcat_profile
title: Construct-DCAT Application Profile
description: A DCAT-compatible application profile for construction-domain dataset discovery.
prefixes:
  linkml: https://w3id.org/linkml/
  dcat: http://www.w3.org/ns/dcat#
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  prov: http://www.w3.org/ns/prov#
  foaf: http://xmlns.com/foaf/0.1/
  aas: https://admin-shell.io/aas/3/0/
  bot: https://w3id.org/bot#
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4/ADD2_TC1/OWL#
  cx: https://w3id.org/cx#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
  - linkml:types
default_prefix: cx
default_range: string
types:
  anyURI:
    uri: xsd:anyURI
    base: str
annotations:
  base_profiles:
    value: dcat,dcat-ap
classes:
  DcatResource:
    title: DCAT Resource
    class_uri: dcat:Resource
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: optional
  DcatCatalog:
    title: DCAT Catalog
    is_a: DcatResource
    class_uri: dcat:Catalog
    slots:
      - title
      - description
      - publisher
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
  DcatDataset:
    title: DCAT Dataset
    is_a: DcatResource
    class_uri: dcat:Dataset
    slots:
      - title
      - description
      - publisher
      - issued
      - modified
      - theme
      - keyword
      - contactPoint
      - distribution
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
  DcatDistribution:
    title: DCAT Distribution
    class_uri: dcat:Distribution
    slots:
      - accessURL
      - downloadURL
      - license
      - rights
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
  DcatDataService:
    title: DCAT Data Service
    class_uri: dcat:DataService
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
  DcatCatalogRecord:
    title: DCAT Catalog Record
    class_uri: dcat:CatalogRecord
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
  FoafAgent:
    title: Agent
    class_uri: foaf:Agent
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: foaf
  SkosConcept:
    title: SKOS Concept
    class_uri: skos:Concept
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: skos
  DctermsLicenseDocument:
    title: License Document
    class_uri: dcterms:LicenseDocument
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
  DctermsRightsStatement:
    title: Rights Statement
    class_uri: dcterms:RightsStatement
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
  DctermsLocation:
    title: Location
    class_uri: dcterms:Location
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
  DctermsFrequency:
    title: Frequency
    class_uri: dcterms:Frequency
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
  ConstructionDatasetProfile:
    title: Construction Dataset
    description: Dataset profile for construction-domain discovery metadata.
    is_a: DcatDataset
    class_uri: cx:ConstructionDataset
    slots:
      - semanticAnchor
      - describesAssetType
      - usesOntology
      - hasLifecyclePhase
      - hasRepresentationType
      - hasGranularityLevel
      - hasDataSourceSystem
    annotations:
      term_kind:
        value: profile
      profile_of:
        value: dcat:Dataset
      source_vocabulary:
        value: dcat
      requirement_level:
        value: mandatory
      usage_note:
        value: Use this profile when describing construction-domain datasets in catalog onboarding.
  AASDataset:
    title: AAS Dataset
    is_a: ConstructionDatasetProfile
    class_uri: cx:AASDataset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Dataset whose semantic anchor includes an Asset Administration Shell submodel.
  BIMDataset:
    title: BIM Dataset
    is_a: ConstructionDatasetProfile
    class_uri: cx:BIMDataset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Dataset containing or derived from BIM/IFC information.
  SemanticModelDataset:
    title: Semantic Model Dataset
    is_a: ConstructionDatasetProfile
    class_uri: cx:SemanticModelDataset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: Dataset represented as RDF, OWL, SHACL, or another semantic model.
  HybridDataset:
    title: Hybrid Dataset
    is_a: ConstructionDatasetProfile
    class_uri: cx:HybridDataset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: Dataset combining multiple representation types.
  ConstructionAsset:
    title: Construction Asset
    class_uri: cx:ConstructionAsset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Construction asset type described by a dataset.
  LifecyclePhase:
    title: Lifecycle Phase
    class_uri: cx:LifecyclePhase
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Lifecycle phase context for a construction dataset.
  SemanticAnchor:
    title: Semantic Anchor
    class_uri: cx:SemanticAnchor
    slots:
      - hasAASSubmodel
      - hasIFCEntity
      - alignsWithConcept
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: mandatory
      usage_note:
        value: Anchor from dataset metadata to an ontology class, SKOS concept, AAS submodel, IFC entity, or identifier.
slots:
  title:
    title: Title
    slot_uri: dcterms:title
    range: string
    required: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: mandatory
  description:
    title: Description
    slot_uri: dcterms:description
    range: string
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: recommended
  publisher:
    slot_uri: dcterms:publisher
    range: FoafAgent
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: recommended
  issued:
    slot_uri: dcterms:issued
    range: string
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: optional
  modified:
    slot_uri: dcterms:modified
    range: string
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: optional
  theme:
    slot_uri: dcat:theme
    range: SkosConcept
    multivalued: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: recommended
  keyword:
    slot_uri: dcat:keyword
    range: string
    multivalued: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: recommended
  contactPoint:
    slot_uri: dcat:contactPoint
    range: string
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: recommended
  distribution:
    slot_uri: dcat:distribution
    range: DcatDistribution
    multivalued: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: recommended
  accessURL:
    slot_uri: dcat:accessURL
    range: anyURI
    required: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: mandatory
  downloadURL:
    slot_uri: dcat:downloadURL
    range: anyURI
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcat
      requirement_level:
        value: recommended
  license:
    slot_uri: dcterms:license
    range: DctermsLicenseDocument
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: recommended
  rights:
    slot_uri: dcterms:rights
    range: DctermsRightsStatement
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: optional
  spatial:
    slot_uri: dcterms:spatial
    range: DctermsLocation
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: optional
  temporal:
    slot_uri: dcterms:temporal
    range: string
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: optional
  conformsTo:
    slot_uri: dcterms:conformsTo
    range: anyURI
    multivalued: true
    annotations:
      term_kind:
        value: base
      source_vocabulary:
        value: dcterms
      requirement_level:
        value: recommended
  semanticAnchor:
    title: Semantic anchor
    description: Links dataset metadata to a semantic reference that explains the dataset meaning.
    slot_uri: cx:semanticAnchor
    range: SemanticAnchor
    multivalued: true
    required: true
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: mandatory
      usage_note:
        value: Use at least one anchor to connect the dataset to an ontology, SKOS concept, AAS submodel, IFC entity, or controlled vocabulary.
      recommended_vocabulary:
        value: skos,aas,ifc,bot
  describesAssetType:
    slot_uri: cx:describesAssetType
    range: ConstructionAsset
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Identifies the construction asset type represented by the dataset.
  usesOntology:
    slot_uri: cx:usesOntology
    range: anyURI
    multivalued: true
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Ontology or vocabulary used to describe or interpret the dataset.
  hasAASSubmodel:
    slot_uri: cx:hasAASSubmodel
    range: anyURI
    multivalued: true
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: AAS submodel identifier or URI used as a semantic anchor.
  hasIFCEntity:
    slot_uri: cx:hasIFCEntity
    range: anyURI
    multivalued: true
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: IFC entity URI or identifier used as a semantic anchor.
  alignsWithConcept:
    slot_uri: cx:alignsWithConcept
    range: SkosConcept
    multivalued: true
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: SKOS concept describing the dataset topic, asset type, lifecycle phase, or domain concept.
  hasLifecyclePhase:
    slot_uri: cx:hasLifecyclePhase
    range: LifecyclePhaseEnum
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Construction lifecycle phase associated with the dataset.
  hasRepresentationType:
    slot_uri: cx:hasRepresentationType
    range: RepresentationTypeEnum
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: recommended
      usage_note:
        value: Main representation type of the dataset.
  hasGranularityLevel:
    slot_uri: cx:hasGranularityLevel
    range: string
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: Dataset granularity, such as building, storey, element, system, zone, document, or time series.
  hasDataSourceSystem:
    slot_uri: cx:hasDataSourceSystem
    range: string
    annotations:
      term_kind:
        value: extension
      requirement_level:
        value: optional
      usage_note:
        value: Source system, tool, platform, or dataspace connector that supplied the dataset.
enums:
  RepresentationTypeEnum:
    permissible_values:
      aas:
      ifc:
      rdf:
      owl:
      json:
      csv:
      pdf:
      hybrid:
  LifecyclePhaseEnum:
    permissible_values:
      planning:
      design:
      procurement:
      construction:
      operation:
      maintenance:
      demolition:
  SemanticAnchorTypeEnum:
    permissible_values:
      ontology_class:
      skos_concept:
      aas_submodel:
      ifc_entity:
      external_identifier:
      controlled_vocabulary:
